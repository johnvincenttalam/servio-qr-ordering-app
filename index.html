<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#fafaf7" />
    <meta name="description" content="SERVIO - QR-Based Smart Restaurant Ordering" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>SERVIO</title>
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: oklch(0.98 0 0);
        color: oklch(0.18 0 0);
        transition: opacity 380ms ease-out;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #app-splash[data-hide="true"] {
        opacity: 0;
        pointer-events: none;
      }
      #app-splash .splash-mark {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: oklch(0.18 0 0);
        display: flex;
        align-items: center;
        justify-content: center;
        animation: splash-mark-in 480ms cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      #app-splash .splash-mark svg {
        width: 30px;
        height: 30px;
        stroke: oklch(0.99 0 0);
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }
      #app-splash .splash-mark svg path {
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation: splash-stroke-draw 700ms 220ms cubic-bezier(0.65, 0, 0.45, 1) forwards;
      }
      #app-splash .splash-wordmark {
        margin-top: 22px;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.03em;
        opacity: 0;
        animation: splash-fade-up 360ms 720ms ease-out forwards;
      }
      #app-splash .splash-dots {
        margin-top: 28px;
        display: flex;
        gap: 6px;
        opacity: 0;
        animation: splash-fade-up 320ms 1000ms ease-out forwards;
      }
      #app-splash .splash-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: oklch(0.5 0 0);
        animation: splash-dot-pulse 1.2s ease-in-out infinite;
      }
      #app-splash .splash-dot:nth-child(2) { animation-delay: 160ms; }
      #app-splash .splash-dot:nth-child(3) { animation-delay: 320ms; }

      @keyframes splash-mark-in {
        from { opacity: 0; transform: scale(0.55); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes splash-stroke-draw {
        to { stroke-dashoffset: 0; }
      }
      @keyframes splash-fade-up {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes splash-dot-pulse {
        0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
        40%           { opacity: 1; transform: translateY(-3px); }
      }

      @media (prefers-reduced-motion: reduce) {
        #app-splash .splash-mark,
        #app-splash .splash-mark svg path,
        #app-splash .splash-wordmark,
        #app-splash .splash-dots,
        #app-splash .splash-dot {
          animation: none;
        }
        #app-splash .splash-mark svg path {
          stroke-dashoffset: 0;
        }
        #app-splash .splash-wordmark,
        #app-splash .splash-dots {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-splash" aria-hidden="true" role="presentation">
      <div class="splash-mark">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path pathLength="100" d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"></path>
          <path pathLength="100" d="M7 2v20"></path>
          <path pathLength="100" d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"></path>
        </svg>
      </div>
      <div class="splash-wordmark">SERVIO</div>
      <div class="splash-dots">
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
